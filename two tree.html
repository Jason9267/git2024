function arrayToTree(arr, idx = 0) {
    if (idx >= arr.length || arr[idx] === null) {
        return null
    }
    let root = new TreeNode(arr[idx])
    root.left = arrayToTree(arr, idx * 2 + 1)
    root.right = arrayToTree(arr, idx * 2 + 2)
    return root
}
function treeToArray(root, idx = 0, arr = []) {
    if (!root) {
        return arr
    }
    arr[idx] = root.val
    treeToArray(root.left, idx * 2 + 1, arr)
    treeToArray(root.right, idx * 2 + 2,arr)
    return arr
}
class TreeNode {
    constructor(val) {
        this.val = val
        this.left = null
        this.right = null
    }
}
function condensedArrayToTree(arr, idx = 0) {
    if (arr.length === 0) {
        return null
    }
    let root = new TreeNode(arr[0])
    nodes = [root]
    for (let i = 1; i < arr.length; i++) {
        let curr = nodes.shift()
        let val = arr[i]
        let node
        if (val === null) {
            node = null
        } else {
            node = new TreeNode(val)
            nodes.push(node)
        }
        curr.left = node
        i++
        let vals = arr[i]
        if (vals === null) {
            node = null
        } else {
            node = new TreeNode(vals)
            nodes.push(node)
        }
        curr.right = node
    }
    return root
}
function condensedtreeToArray(root, arr = []) {
    if(!root) {
        return arr
    }
    let nodes = [root]
    while (nodes.length > 0) {
        let curr = nodes.shift()
        if (curr) {
            let val = curr.val
            arr.push(val)
            nodes.push(curr.left, curr.right)
        }
    }
    return arr
}

//Retry
class MultiplicatorUnitFailure extends Error {}
function primitiveMultiply(a, b) {
    if(Math.random() > 0.5){
        let c = a * b
        return c
    } else {
        throw new MultiplicatorUnitFailure('failed')
    }
}
function Multiply(a, b) {
    for(;;) {
        try{
            return primitiveMultiply(a, b)
        }catch(e){
            if (e instanceof MultiplicatorUnitFailure) {
                continue
            } else {
            throw e
            }
        } 
    }
}
//The locked box
let box = {
    locked : true ,
    unlock : function () { this . locked = false ; },
    lock : function () { this . locked = true ; },
    _content : [1,2,3],
    get content () {
    if ( this . locked ) throw new Error (" Locked !");
    return this . _content ;
    }
}
function withBoxUnlocked(f) {
    box.unlock()
    try {
        f()
    } finally {
        box.lock()
    }
}
withBoxUnlocked(() => {
    console.log(box.content)
    box._content.push(4)
    console.log(box.content)
