<script src="https://cdn.tailwindcss.com/"></script>
<div id="foo"></div>
<script>
class TreeNode {
    constructor(val) {
        this.val = val
        this.left = null
        this.right = null
    }
}
function condensedArrayToTree(arr, idx = 0) {
    if (arr.length === 0) {
        return null
    }
    let root = new TreeNode(arr[0])
    nodes = [root]
    for (let i = 1; i < arr.length; i++) {
        let curr = nodes.shift()
        let val = arr[i]
        let node
        if (val === null) {
            node = null
        } else {
            node = new TreeNode(val)
            nodes.push(node)
        }
        curr.left = node
        i++
        let vals = arr[i]
        if (vals === null) {
            node = null
        } else {
            node = new TreeNode(vals)
            nodes.push(node)
        }
        curr.right = node
    }
    return root
}
function condensedtreeToArray(root, arr = []) {
    if(!root) {
        return arr
    }
    let nodes = [root]
    while (nodes.length > 0) {
        let curr = nodes.shift()
        if (curr) {
            let val = curr.val
            arr.push(val)
            nodes.push(curr.left, curr.right)
        }
    }
    return arr
}
function getheight(root) {
  if (!root) return 0
  return 1 + Math.max(getheight(root.left), getheight(root.right))
}
function fill(node, row, left, right, res) {
  if (!node) return
  let mid = (left + right) >> 1
  res[row][mid] = String(node.val)
  fill(node.left, row + 1, left, mid - 1, res)
  fill(node.right, row + 1, mid + 1, right, res) 
}
function printTree(root) {
  let height = getheight(root)
  let rows = height
  let cols = 2 ** height - 1
  let res = []
  for (let i = 0; i < rows; i++) {
    res[i] = []
    for (let j = 0; j < cols; j++) {
      res[i][j] = " "
    }
  }
  fill(root, 0, 0, cols - 1, res)
  return res
}
function printTreeConsole(root) {
  let res = printTree(root)
  for (let i = 0; i < res.length; i++) {
    console.log(res[i].join(''));
  }
}
function renderTreeToHTML(root) {
  if (!root) return ''
  return `
    <div class = "flex flex-wrap">
      <header class = "w-full text-center">${root.val}</header>
      <aside class = "w-1/2">${renderTreeToHTML(root.left)}</aside>
      <aside class = "w-1/2">${renderTreeToHTML(root.right)}</aside>
    </div>
  `
}
function showTree(root) {
  foo.innerHTML = renderTreeToHTML(root)
}
</script>
