class TreeNode {
    constructor(val) {
        this.val = val
        this.left = null
        this.right = null
    }
}
function arrayToTree1(arr, idx = 0) {
    if (idx >= arr.length || arr[idx] === null) {
        return null
    }
    let root = new TreeNode(arr[idx])
    root.left = arrayToTree1(arr, idx * 2 + 1)
    root.right = arrayToTree1(arr, idx * 2 + 2)
    return root
}
function treeToArray1(root, idx = 0, arr = []) {
    if (!root) {
        return arr
    }
    arr[idx] = root.val
    treeToArray1(root.left, idx * 2 + 1, arr)
    treeToArray1(root.right, idx * 2 + 2,arr)
    return arr
}
